# Default values for whatomate.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: shridh0r/whatomate
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

# Service — ClusterIP only, no NodePort/hostPort to avoid local conflicts
service:
  type: ClusterIP
  port: 8080

# Ingress for Minikube (nginx ingress addon is enabled)
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: whatomate.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
  - name: gateway
    sectionName: http
  hostnames:
  - whatomate.local
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /

# Production-ready resource limits
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Startup probe: gives the app up to 180s to complete migrations before
# liveness/readiness probes take over. Uses '/' (embedded frontend, 200 OK).
# '/api/v1/ping' returns 401 and cannot be used as a probe endpoint.
startupProbe:
  httpGet:
    path: /
    port: http
  failureThreshold: 36       # 36 * 5s = 180s max startup window
  periodSeconds: 5
  timeoutSeconds: 3

# Liveness probe: only active after startupProbe succeeds
livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 0
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

# Readiness probe: marks pod ready once the frontend responds
readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 0
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}

# Environment variables passed to the app container
env:
  - name: APP_ENV
    value: "development"

# PostgreSQL dependency — ClusterIP only (no hostPort; avoids conflict with
# local Docker Compose postgres on 127.0.0.1:5433)
postgresql:
  auth:
    username: whatomate
    password: whatomate
    database: whatomate
  primary:
    persistence:
      enabled: true
      size: 2Gi
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    # No hostPort — internal ClusterIP service only
    service:
      type: ClusterIP
      ports:
        postgresql: 5432

# Redis dependency — standalone, no auth, ClusterIP only (no hostPort;
# avoids conflict with local Docker Compose redis on 127.0.0.1:6380)
redis:
  auth:
    enabled: false
  architecture: standalone
  master:
    persistence:
      enabled: true
      size: 1Gi
    resources:
      limits:
        cpu: 250m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 64Mi
    # No hostPort — internal ClusterIP service only
    service:
      type: ClusterIP
      ports:
        redis: 6379

# WhatoMate Application config.toml — templated with release name
# Database host = whatomate-postgresql (K8s service, not localhost)
# Redis host    = whatomate-redis-master (K8s service, not localhost)
whatomateConfig: |-
  [app]
  name = "Whatomate"
  environment = "development"
  debug = true
  encryption_key = ""

  [server]
  host = "0.0.0.0"
  port = 8080
  read_timeout = 30
  write_timeout = 30
  base_path = ""
  allowed_origins = ""

  [database]
  host = "{{ .Release.Name }}-postgresql"
  port = 5432
  user = "whatomate"
  password = "whatomate"
  name = "whatomate"
  ssl_mode = "disable"
  max_open_conns = 25
  max_idle_conns = 5
  conn_max_lifetime = 300

  [redis]
  host = "{{ .Release.Name }}-redis-master"
  port = 6379
  username = ""
  password = ""
  db = 0
  tls = false

  [jwt]
  secret = "your-super-secret-jwt-key-change-in-production"
  access_expiry_mins = 15
  refresh_expiry_days = 1

  [storage]
  type = "local"
  local_path = "./uploads"

  [cookie]
  domain = ""
  secure = false

  [rate_limit]
  enabled = false
  login_max_attempts = 10
  register_max_attempts = 10
  refresh_max_attempts = 30
  sso_max_attempts = 10
  window_seconds = 60
  trust_proxy = false

  [calling]
  max_call_duration = 300
  audio_dir = "./audio"
  transfer_timeout_secs = 120
  recording_enabled = true
  udp_port_min = 10000
  udp_port_max = 10100

  [default_admin]
  email = "admin@admin.com"
  password = "admin"
  full_name = "Admin"
